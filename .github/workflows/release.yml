name: Release

# Triggered by pushing a version tag, e.g. `git tag v1.0.0 && git push --tags`.
# Builds a signed release APK and publishes it as a GitHub Release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore signing keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KS_B64" | base64 -d > android/app/moneycap-release.jks
          cat > android/key.properties <<EOF
          storePassword=$KS_PASS
          keyPassword=$KEY_PASS
          keyAlias=$KEY_ALIAS
          storeFile=moneycap-release.jks
          EOF

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Stage APK with version name
        run: cp build/app/outputs/flutter-apk/app-release.apk "moneycap-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: moneycap-*.apk
